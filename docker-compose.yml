version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: znl
      POSTGRES_PASSWORD: znl123
      POSTGRES_DB: znl_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/data/backup
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    volumes:
      - ./photos:/frontend/public/photos
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: znl
      DB_PASSWORD: znl123
      DB_NAME: znl_db
      SECRET_KEY: change-this-in-production-znl-2024-is-long-enough
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://114.55.111.133
      DEBUG: "false"
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
