version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: znl
      POSTGRES_PASSWORD: znl123
      POSTGRES_DB: znl_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backup:/data/backup
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_USER: znl
      DB_PASSWORD: znl123
      DB_NAME: znl_db
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
